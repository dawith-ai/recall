name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macOS 와 Linux × Python 3.11~3.13 — 이식성이 핵심
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash   # windows-latest 도 Git Bash 로 통일
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: SQLite FTS5/trigram 가용성 (한국어 검색의 전제)
        run: |
          python -c "import sqlite3; c=sqlite3.connect(':memory:'); c.execute(\"CREATE VIRTUAL TABLE t USING fts5(x, tokenize='trigram')\"); print('trigram OK')"
      - name: Syntax check (stdlib only)
        run: python -m py_compile recall/*.py
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Console script
        run: recall --version
      - name: Run tests
        run: pytest -q tests/
